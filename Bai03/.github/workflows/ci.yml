name: Maven CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Bước 3: Build toàn bộ project (parent pom.xml)
      - name: Build with Maven
        run: mvn -B clean verify package

      # Bước 4: Upload artifact (.jar) của module Bai03
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-app-jar
          path: Bai03/target/*.jar
