name: Bai04 Matrix Strategy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    # MÌNH ĐÃ XÓA PHẦN 'defaults' Ở ĐÂY ĐỂ TRÁNH BỊ KHÓA THƯ MỤC LÀM VIỆC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # BƯỚC THÊM MỚI: Install project gốc trước (bỏ qua test để chạy nhanh)
      - name: Install Root Project
        run: mvn -B clean install -DskipTests

      # Mới chui vào Bai04 để chạy Test (Bài 4)
      - name: Build with Maven (Test and Package)
        run: mvn -B clean test package
        working-directory: ./Bai04

      # Lưu lại Artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bai04-Build-Artifact-${{ matrix.os }}
          path: Bai04/target/*.jar