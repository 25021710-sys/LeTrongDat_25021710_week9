name: Bai07 Automated Code Review via PR

on:
  push:
    branches: [ "main", "master" ]
  # Sự kiện này rất quan trọng cho Bài 7: Kích hoạt khi có người tạo Pull Request
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, Test and Checkstyle for Bai07
        # Chạy verify sẽ kích hoạt cả test (JaCoCo) và Checkstyle (do đã cấu hình trong pom.xml)
        run: mvn -B clean verify -pl Bai07 -am

      # --- PHẦN THÊM MỚI CHO BÀI 7: BOT BÌNH LUẬN ---
      - name: Checkstyle Inline Feedback Bot
        # Dùng if: always() để đảm bảo Bot vẫn chạy và comment dù bước Build ở trên bị FAILED do lỗi code
        # Chỉ chạy trên sự kiện PR và ở môi trường Ubuntu (để tránh bot spam 3 bình luận giống nhau do matrix)
        if: always() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
      # ---------------------------------------------

      - name: Upload JAR Artifact
        # Dùng if: always() để file JAR và Report vẫn được lưu trữ ngay cả khi code bị lỗi format
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bai07-Build-Artifact-${{ matrix.os }}
          path: Bai07/target/*.jar

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bai07-JaCoCo-Report-${{ matrix.os }}
          path: Bai07/target/site/jacoco/