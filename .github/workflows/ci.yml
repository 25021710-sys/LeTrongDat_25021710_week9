name: Bai06 Pipeline Optimization and Caching

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Đây là trái tim của Bài 06: Giúp lưu trữ các dependency để dùng lại
          cache: maven

      - name: Build and Verify Bai06
        # Lưu ý: Nếu bạn đã đổi tên folder/artifactId thành Bai06 thì sửa -pl Bai06
        # Còn nếu vẫn dùng code Bai05 để test cache thì để Bai05 nhé.
        # Ở đây mình để Bai06 theo yêu cầu của bạn.
        run: mvn -B clean verify -pl Bai06 -am

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bai06-Build-Artifact-${{ matrix.os }}
          path: Bai06/target/*.jar

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: Bai06-JaCoCo-Report-${{ matrix.os }}
          # Sửa path cho khớp với folder Bai06
          path: Bai06/target/site/jacoco/ 