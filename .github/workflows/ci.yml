name: Bai04 Matrix Strategy

# Kích hoạt (trigger) khi có sự kiện push và pull_request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      # fail-fast: false giúp các job trên OS khác vẫn tiếp tục chạy ngay cả khi có 1 OS bị lỗi
      # (Rất hữu ích cho Bài 4 vì bạn sẽ cố tình tạo lỗi trên 1 HĐH)
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    # Chỉ định thư mục làm việc mặc định cho các lệnh 'run' là Bai04
    defaults:
      run:
        working-directory: ./Bai04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Thực thi vòng đời build của Maven (test và package) trong thư mục Bai04
      - name: Build with Maven (Test and Package)
        run: mvn -B clean test package

      # Triển khai action upload-artifact để lưu giữ tệp .jar
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          # Đổi tên artifact để phân biệt giữa các hệ điều hành, tránh bị ghi đè lẫn nhau
          name: Bai04-Build-Artifact-${{ matrix.os }}
          # Sửa lại đường dẫn thành Bai04 vì bạn đang build project Bai04
          path: Bai04/target/*.jar