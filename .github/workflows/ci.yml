name: Bai05 Code Coverage Strategy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Sử dụng verify thay vì test để JaCoCo kiểm tra ngưỡng 80% coverage
      - name: Build and Verify Bai05 with JaCoCo
        run: mvn -B clean verify -pl Bai05 -am

      # Lưu trữ file JAR sản phẩm
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bai05-Build-Artifact-${{ matrix.os }}
          path: Bai05/target/*.jar

      # Lưu trữ báo cáo JaCoCo để xem độ bao phủ code (Bài 5)
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: Bai05-JaCoCo-Report-${{ matrix.os }}
          path: Bai05/target/site/jacoco/