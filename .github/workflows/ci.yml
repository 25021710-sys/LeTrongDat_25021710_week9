name: Java CI for Bai10

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test Bai10
      # Lệnh này sẽ chạy Maven cho module Bai10
      run: mvn -pl Bai10 -am package

    # --- CÁC BƯỚC DƯỚI ĐÂY SẼ CHẠY KỂ CẢ KHI BƯỚC TRÊN BỊ LỖI (ĐỂ BẠN LẤY REPORT) ---
    - name: Upload JAR Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Bai10-Build-Artifact
        path: Bai10/target/*.jar

    - name: Upload JaCoCo Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Bai10-JaCoCo-Report
        path: Bai10/target/site/jacoco/
