name: Bai04 Matrix Strategy

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Đứng ở thư mục gốc, nhưng chỉ build và test riêng module Bai04 (-pl Bai04)
      # và các module mà Bai04 phụ thuộc (-am)
      - name: Build and Test Bai04 Only
        run: mvn -B clean test package -pl Bai04 -am

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bai04-Build-Artifact-${{ matrix.os }}
          path: Bai04/target/*.jar